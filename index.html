<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabona Virtuális Foci Eredmények</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #ffffff; text-align: center; padding: 20px; }
        .box { background: #2a2a2a; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); margin-top: 50px; }
        input[type="password"] { padding: 10px; width: 200px; border-radius: 5px; border: none; margin-bottom: 15px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #45a049; }
        #data-section { display: none; margin-top: 30px; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; max-width: 600px; background: #222; }
        th, td { border: 1px solid #444; padding: 12px; text-align: center; }
        th { background-color: #333; color: #4CAF50; }
        tr:nth-child(even) { background-color: #2b2b2b; }
        .error { color: #ff3333; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h2>Zárt Adatbázis</h2>
        <p>Kérjük, add meg a jelszót az eredmények megtekintéséhez:</p>
        <input type="password" id="password-input" placeholder="Jelszó..."><br>
        <button onclick="checkPassword()">Belépés</button>
        <div id="error-msg" class="error"></div>
    </div>

    <div id="data-section">
        <h2>Élő Mérkőzés Eredmények</h2>
        <p>Az adatok automatikusan frissülnek a háttérben.</p>
        <table>
            <thead>
                <tr>
                    <th>Eseményszám</th>
                    <th>Mérkőzés</th>
                    <th>Végeredmény</th>
                </tr>
            </thead>
            <tbody id="results-table-body">
                </tbody>
        </table>
        <button onclick="logout()" style="background-color: #d9534f;">Kijelentkezés</button>
    </div>

    <script>
        // Ezt a jelszót írd majd át arra, amit te szeretnél!
        const TITKOS_JELSZO = "Vsport2026"; 

        function checkPassword() {
            const input = document.getElementById("password-input").value;
            const errorMsg = document.getElementById("error-msg");

            if (input === TITKOS_JELSZO) {
                // Ha jó a jelszó, elmentjük a böngészőbe, hogy ne kelljen frissítéskor újra beírni
                localStorage.setItem("isLoggedIn", "true");
                showData();
            } else {
                errorMsg.innerText = "Hibás jelszó! Próbáld újra.";
            }
        }

        function showData() {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("data-section").style.display = "block";
            loadResults();
            // 30 másodpercenként frissíti a táblázatot az oldalon belül is
            setInterval(loadResults, 30000);
        }

        function loadResults() {
            // Beolvassuk a Python által feltöltött eredmények.json fájlt
            fetch('eredmenyek.json?t=' + Date.now()) // a Date.now() megakadályozza, hogy a böngésző a régi verziót gyorsítótárazza
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById("results-table-body");
                    tbody.innerHTML = ""; // Kiürítjük a táblázatot

                    // Megfordítjuk a listát, hogy a legfrissebb meccs legyen legfelül
                    const list = Object.values(data).reverse();

                    list.forEach(match => {
                        const row = `<tr>
                            <td>#${match.szam}</td>
                            <td>${match.nev}</td>
                            <td><strong>${match.eredmeny}</strong></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                })
                .catch(err => {
                    console.log("Még nincsenek adatok feltöltve, vagy hiba történt.");
                });
        }

        function logout() {
            localStorage.removeItem("isLoggedIn");
            window.location.reload();
        }

        // Ha már be volt lépve korábban, egyből mutassuk az adatokat
        if (localStorage.getItem("isLoggedIn") === "true") {
            showData();
        }
    </script>
</body>
</html>
